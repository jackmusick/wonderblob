# Flatpak manifest — the Linux bundle (one install, real menu integration).
#
# Local build + run (needs the deb next to this file, named wonderblob.deb):
#   cp target/release/bundle/deb/Wonderblob_*_amd64.deb \
#     packaging/flatpak/wonderblob.deb
#   flatpak-builder --user --install --force-clean build-dir \
#     packaging/flatpak/com.wonderblob.app.yml
#   flatpak run com.wonderblob.app
#
# Unlike a from-source manifest, this does NOT compile Rust/JS in the sandbox —
# it unpacks the prebuilt .deb and relies on org.gnome.Platform for
# webkit2gtk-4.1. Verify the runtime-version below actually ships webkit2gtk
# (bump if the app fails to launch from the built bundle).
app-id: com.wonderblob.app
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: wonderblob

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Every backend talks to the network: S3, Azure Blob, SFTP, OneDrive (Graph).
  - --share=network
  # OneDrive sign-in opens the browser; opening a file in the user's editor
  # (EditSession) also rides OpenURI.
  - --talk-name=org.freedesktop.portal.OpenURI
  # Saved connection secrets go to the host keyring via the Secret Service
  # (gnome-keyring / KDE ksecretd). Without this the sandbox filters the name
  # out and every keyring call fails with org.freedesktop.DBus.Error.ServiceUnknown.
  - --talk-name=org.freedesktop.secrets
  # SFTP agent auth. --socket=ssh-auth covers any agent reached via the standard
  # $SSH_AUTH_SOCK (default agent, gpg-agent, gnome-keyring, systemd, yubikey).
  # Password-manager agents are instead selected via IdentityAgent in ssh_config
  # at fixed vendor paths the sandbox can't see — pre-grant the common ones so
  # they work out of the box. Anything else: see README for a one-time override.
  - --socket=ssh-auth
  - --filesystem=~/.1password/agent.sock         # 1Password
  - --filesystem=~/.bitwarden-ssh-agent.sock     # Bitwarden
  # Read ssh_config to honor IdentityAgent (points agent auth at the right
  # socket, e.g. 1Password) and to read key files for KeyFile auth. Read-only:
  # host keys use the app's own known_hosts store, not ~/.ssh. Without this the
  # sandbox can't see the config, agent auth falls back to the empty default
  # $SSH_AUTH_SOCK agent, and SFTP fails with "Authentication failed".
  - --filesystem=~/.ssh:ro
  # "To Downloads" writes ~/Downloads directly (no save dialog). Regular
  # open/save dialogs go through the file-chooser portal — no broad fs grant.
  - --filesystem=xdg-download

modules:
  - name: wonderblob
    buildsystem: simple
    build-commands:
      # Unpack the Debian package: ar -> data.tar.* -> usr/ tree.
      - ar x wonderblob.deb
      - mkdir -p deb-root
      - tar -xf data.tar.* -C deb-root
      # Binary.
      - install -Dm755 deb-root/usr/bin/wonderblob ${FLATPAK_DEST}/bin/wonderblob
      # Desktop file, renamed to the app-id with Icon= pointed at the app-id.
      - |
        src_desktop=$(ls deb-root/usr/share/applications/*.desktop | head -n1)
        # Point Icon at the app-id AND append the `%u` field code to Exec: the
        # Tauri bundler omits it, so without this the `wonderblob://auth` OAuth
        # redirect URL is never passed to the handler (XDG drops the URL when
        # Exec has no %u/%U). flatpak's desktop export preserves the field code.
        sed -e 's/^Icon=.*/Icon=com.wonderblob.app/' \
            -e '/^Exec=/ { /%[uUfF]/! s/$/ %u/ }' "$src_desktop" \
          > ${FLATPAK_ID}.desktop
        install -Dm644 ${FLATPAK_ID}.desktop \
          ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      # Icons: copy every size/format the deb shipped, renamed to the app-id.
      - |
        for icon in $(find deb-root/usr/share/icons -type f); do
          dir=$(dirname "$icon" | sed 's|deb-root/usr/share/icons|share/icons|')
          ext="${icon##*.}"
          install -Dm644 "$icon" "${FLATPAK_DEST}/${dir}/${FLATPAK_ID}.${ext}"
        done
    sources:
      - type: file
        path: wonderblob.deb
