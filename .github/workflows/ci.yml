name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: System deps (Tauri + keyring on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev \
            libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

      - name: SFTP contract tests
        run: |
          ./scripts/test-sftp-up.sh
          WONDERBLOB_TEST_SFTP=1 cargo test -p wonderblob-core --test sftp_contract
          ./scripts/test-sftp-down.sh

      - name: SFTP agent + key-file auth tests
        run: ./scripts/test-sftp-auth.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }

      - run: npm ci
      - run: npm test
      - run: npm run check
