    <circle cx="616" cy="504" r="28" fill="#17142F"/>
    <path d="M464 580c36 32 88 32 124 0" fill="none" stroke="#17142F" stroke-width="28" stroke-linecap="round"/>

    <path d="M712 296l76-140" stroke="#17142F" stroke-width="28" stroke-linecap="round"/>
    <circle cx="804" cy="136" r="36" fill="#C084FC" stroke="#17142F" stroke-width="24"/>

    <path d="M860 260h64M892 228v64M142 338h72M178 302v72M760 848h72M796 812v72" stroke="#FDE68A" stroke-width="28" stroke-linecap="round"/>
    <path d="M242 213h44M264 191v44M858 410h42M879 389v42" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
