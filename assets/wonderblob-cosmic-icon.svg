<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Wonderblob Cosmic App Icon</title>
  <desc id="desc">A rounded-square app icon featuring a cyan blob mascot with a wand, folder, transfer trail, and gold sparkles.</desc>
  <defs>
    <linearGradient id="tile" x1="132" y1="96" x2="892" y2="948" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.48" stop-color="#EEF4FF"/>
      <stop offset="1" stop-color="#E7D9FF"/>
    </linearGradient>
    <radialGradient id="tileGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(730 745) rotate(138) scale(360)">
      <stop stop-color="#C084FC" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tileShine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(290 210) rotate(45) scale(260)">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blob" x1="208" y1="152" x2="760" y2="884" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C7F9FF"/>
      <stop offset="0.62" stop-color="#6EE7F9"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="trail" x1="264" y1="352" x2="844" y2="714" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C084FC"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="42" stdDeviation="32" flood-color="#132229" flood-opacity="0.18"/>
    </filter>
    <filter id="glyphShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#132229" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="236" fill="url(#tile)"/>
  <rect width="1024" height="1024" rx="236" fill="url(#tileGlow)"/>
  <rect width="1024" height="1024" rx="236" fill="url(#tileShine)"/>
  <path d="M94 806c216 112 560 102 800-82" fill="none" stroke="#17142F" stroke-opacity="0.06" stroke-width="84" stroke-linecap="round"/>

  <g filter="url(#softShadow)">
    <path d="M213 579c-52-156 8-320 137-400 140-92 308-20 400 80 112 120 188 312 88 456-100 148-328 196-484 120-88-44-108-136-141-256Z" fill="url(#blob)" stroke="#17142F" stroke-width="32" stroke-linejoin="round"/>
  </g>

