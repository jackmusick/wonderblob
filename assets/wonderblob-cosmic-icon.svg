    <path d="M273 664c184 88 440 60 572-108" fill="none" stroke="url(#trail)" stroke-width="52" stroke-linecap="round"/>
    <path d="M817 557l84-4-36 76" fill="none" stroke="#FDE68A" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>

